<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUFFMAN_COMPRESSOR_V1.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanline"></div>
    <div class="container">
        <header>
            <h1 class="glitch" data-text="HUFFMAN COMPRESSOR">HUFFMAN COMPRESSOR</h1>
            <p class="subtitle">SYSTEM STATUS: <span class="online">ONLINE</span></p>
        </header>

        <div class="main-card">
            <label>SOURCE_INPUT_TEXT</label>
            <textarea id="inputText" placeholder="Enter data to encrypt..."></textarea>
            <button class="neon-btn" onclick="compressText()">EXECUTE COMPRESSION</button>
        </div>

        <div class="stats-container">
            <div class="stat-box">
                <h4>BINARY_STREAM</h4>
                <div id="binaryOutput" class="terminal-text">WAITING FOR INPUT...</div>
            </div>
            
            <div class="stat-box efficiency-box">
                <h4>OPTIMIZATION</h4>
                <div class="percent" id="efficiency">0%</div>
                <p>DATA REDUCTION RATE</p>
            </div>
        </div>

        <footer>
            <p>DESIGNED BY: <span class="author">JISHNU BANERJEE</span> // ECE_UNIT_2026</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
